<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPZ · Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="spz-ui.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
    <script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/babel" src="components/index.jsx"></script>

    <script type="text/babel">
        /** @jsx h */
        const { h, render, Fragment } = preact;
        const { useState, useEffect } = preactHooks;
        const { Icon } = window;

        /* ── NametagBanner ────────────────────────────────────── */
        function NametagBanner({ name, subtitle = 'TRACK LEADERBOARD' }) {
            return (
                <div className="nametag-banner glass-panel">
                    <div className="nametag-avatar">
                        <Icon name="flag" size={24} />
                    </div>
                    <div className="nametag-info">
                        <span className="nametag-subtitle">{subtitle}</span>
                        <span className="nametag-name">{name}</span>
                    </div>
                    <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 24 }}>
                        <div style={{ textAlign: 'right' }}>
                            <div className="nametag-subtitle">TELEMETRY</div>
                            <div className="status-pill" style={{ marginTop: 4 }}>
                                <div className="status-dot"></div>
                                <span style={{ color: 'var(--color-success)', fontWeight: 700, fontSize: 11, fontFamily: 'var(--font-mono)' }}>LIVE</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ── LeaderboardRow ───────────────────────────────────── */
        function LeaderboardRow({ entry, index, gap }) {
            const initials = entry.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            const isLeader = entry.rank === 1;
            const delay    = `${0.08 + index * 0.03}s`;

            return (
                <tr className="leaderboard-row-animate" style={{ animationDelay: delay }}>
                    <td className="rank-cell">
                        {isLeader
                            ? <span className="spz-badge" data-variant="solid" style={{ minWidth: 32, justifyContent: 'center' }}>01</span>
                            : <span style={{ opacity: 0.5, fontFamily: 'var(--font-display)', fontWeight: 800 }}>{entry.rank.toString().padStart(2, '0')}</span>
                        }
                    </td>
                    <td>
                        <div className="player-cell">
                            <span className="spz-avatar" style={{ width: 24, height: 24, fontSize: 10 }}>
                                {entry.avatar
                                    ? <img src={entry.avatar} alt="" />
                                    : initials
                                }
                            </span>
                            <div style={{ display: 'flex', flexDirection: 'column' }}>
                                <span className="player-name">{entry.name}</span>
                                <span className="player-meta">PRO DRIVER</span>
                            </div>
                        </div>
                    </td>
                    <td className="vehicle-cell">{entry.vehicle}</td>
                    <td className="gap-cell">{gap}</td>
                    <td className={`time-cell ${isLeader ? 'leader' : ''}`}>{entry.time}</td>
                </tr>
            );
        }

        /* ── LeaderboardTable ─────────────────────────────────── */
        function LeaderboardTable({ entries }) {
            return (
                <div className="leaderboard-table-wrap glass-panel">
                    <table className="spz-table">
                        <thead>
                            <tr>
                                <th style={{ textAlign: 'center', width: 60 }}>POS</th>
                                <th>DRIVER</th>
                                <th>VEHICLE</th>
                                <th style={{ textAlign: 'right' }}>GAP</th>
                                <th style={{ textAlign: 'right' }}>LAP TIME</th>
                            </tr>
                        </thead>
                        <tbody>
                            {entries.map((entry, index) => {
                                const gap = index === 0
                                    ? <span style={{ opacity: 0.3 }}>—</span>
                                    : `+${(index * 0.421 + Math.random() * 0.3).toFixed(3)}`;
                                return (
                                    <LeaderboardRow
                                        key={entry.rank}
                                        entry={entry}
                                        index={index}
                                        gap={gap}
                                    />
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );
        }

        /* ── App ──────────────────────────────────────────────── */
        function App() {
            const [visible,   setVisible]   = useState(false);
            const [trackName, setTrackName] = useState('Los Santos Circuit');
            const [entries,   setEntries]   = useState([]);

            useEffect(() => {
                const onMessage = (event) => {
                    const { action, data } = event.data;
                    if (action === 'showLeaderboard') {
                        setTrackName(data.trackName || 'Unknown Track');
                        setEntries(data.entries || []);
                        setVisible(true);
                    } else if (action === 'hideLeaderboard') {
                        setVisible(false);
                    }
                };

                const onKey = (e) => {
                    if (e.key === 'Escape' && visible) {
                        setVisible(false);
                        fetch('https://spz-leaderboard/close', { method: 'POST' });
                    }
                };

                window.addEventListener('message', onMessage);
                window.addEventListener('keydown',  onKey);
                return () => {
                    window.removeEventListener('message', onMessage);
                    window.removeEventListener('keydown',  onKey);
                };
            }, [visible]);

            if (!visible) return null;

            return (
                <div id="app">
                    <div className="leaderboard-container">
                        <NametagBanner name={trackName} />
                        <LeaderboardTable entries={entries} />
                        <div className="leaderboard-hint">
                            <span>[ESC] TO CLOSE</span>
                            <span className="sep">|</span>
                            <span>SPICEZ-CORE COMPETITIVE</span>
                        </div>
                    </div>
                </div>
            );
        }

        render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
